<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宜宾市街道分区地图 - 高德版</title>
    <!-- 引入高德地图 JS API - 替换 YOUR_KEY 为你的密钥 -->
    <script src="https://webapi.amap.com/maps?v=2.0&key=3940c64072d3da572a07f7704d5174b7&plugin=AMap.DistrictSearch,AMap.Scale,AMap.ToolBar"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: "Microsoft YaHei", sans-serif;
        }
        
        #map-container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }
        
        #map {
            width: 100%;
            height: 100%;
        }
        
        /* 自定义控制面板 */
        .map-controls {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 1000;
            background: white;
            padding: 15px 20px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            max-width: 280px;
            pointer-events: auto;
            border-left: 5px solid #2c3e50;
        }
        
        .map-controls h2 {
            margin: 0 0 8px 0;
            color: #2c3e50;
            font-size: 1.5rem;
        }
        
        .map-controls h2 span {
            font-size: 0.9rem;
            color: #7f8c8d;
            font-weight: normal;
        }
        
        .map-controls p {
            color: #34495e;
            margin-bottom: 15px;
            font-size: 0.9rem;
            border-bottom: 1px solid #ecf0f1;
            padding-bottom: 10px;
        }
        
        .legend-items {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin: 15px 0;
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 12px;
            border-radius: 8px;
            transition: all 0.2s;
            cursor: pointer;
            border: 1px solid transparent;
        }
        
        .legend-item:hover {
            background: #f8f9fa;
            border-color: #dee2e6;
            transform: translateX(5px);
        }
        
        .color-box {
            width: 24px;
            height: 24px;
            border-radius: 6px;
        }
        
        .region-info {
            flex: 1;
        }
        
        .region-name {
            font-weight: 600;
            font-size: 1rem;
            display: flex;
            justify-content: space-between;
        }
        
        .street-count {
            font-size: 0.8rem;
            color: #7f8c8d;
            margin-top: 2px;
        }
        
        .total-stats {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 8px;
            margin: 15px 0;
            text-align: center;
            border: 1px solid #e9ecef;
        }
        
        .total-stats .number {
            font-size: 2rem;
            font-weight: bold;
            color: #2c3e50;
            line-height: 1;
        }
        
        .total-stats .label {
            font-size: 0.85rem;
            color: #7f8c8d;
        }
        
        .btn-reset {
            width: 100%;
            padding: 10px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.95rem;
            transition: background 0.2s;
        }
        
        .btn-reset:hover {
            background: #2980b9;
        }
        
        /* 自定义信息窗口样式 */
        .custom-info-window {
            padding: 10px;
            min-width: 200px;
        }
        
        .custom-info-window h3 {
            margin: 0 0 8px 0;
            padding-bottom: 5px;
            border-bottom: 2px solid;
        }
        
        .region-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            color: white;
            font-size: 12px;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div id="map-container">
        <div id="map"></div>
        
        <!-- 左侧控制面板 -->
        <div class="map-controls">
            <h2>
                🗺️ 宜宾街道地图 
                <span>高德版</span>
            </h2>
            <p>📍 点击圆点查看街道详情</p>
            
            <div class="legend-items" id="region-stats"></div>
            
            <div class="total-stats" id="total-stats">
                <div class="number" id="total-count">0</div>
                <div class="label">宜宾市 · 已收录街道总数</div>
            </div>
            
            <button class="btn-reset" onclick="resetMapView()">
                ⟲ 重置视图
            </button>
        </div>
    </div>

    <script>

                ],
                streets: [
                    '溪口路', '三江路', '菜园沱路', '长江南路', '戎州路', '民康路', '槽房街', '利民路', 
                    '七星路', '东段民康路', '航天路', '华彩路', '英才路', '学园街', '民发街', '田坝街', 
                    '民营街', '新码头街', '马栈街', '酒都路', '商贸路', '文光路', '叙府路', '金发街', 
                    '天平街', '安达街', '民安街', '同盟路', '文博街', '堤顶路', '绿茵路', '广场西路', 
                    '广场东路', '健身路', '展馆路', '迎宾街', '高峰路', '茶马路', '长源路', '会馆路', 
                    '宜庆西街', '南坪巷', '建国路', '大坪街', '下渡口路', '南光路', '黑塔路', '双院街', 
                    '金芽菜街', '安居里东街', '安居里南街', '安居里西街', '安居里北街', '矿泉街', '长乐巷', 
                    '明德路', '桅杆巷', '金鱼井街', '柑子园街', '新民巷', '祥发街', '南广路', '龙湾路', 
                    '裕民街', '古叙路', '路源街', '永兴街', '迎祥街', '平安街', '大房子街', '茶马街', 
                    '永福街', '水云路', '柏杨路', '崇文路', '高坎子街', '五厢路', '外江路', '金沙江南路东段', 
                    '诚信路', '桂园路', '南丝绸路', '郑家坡街', '瞿湾路', '睦邻路', '藤荫街', '水竹林路', 
                    '清溪路', '朱家坡路', '栀香路', '树人路', '飘香街', '桥湾路', '望江路', '丽龙街', 
                    '庄子上路', '书房街', '永康路', '龙金庙街', '南六街', '康强街', '玉衡路', '利群路', 
                    '七贤路', '荔枝路', '站前一街', '怀德路', '凤凰大道', '永安路', '天璇路', '南四路', 
                    '狮子岩路', '黄金湾路', '星辰路', '沐春街', '弘毅路', '南六路', '清音路', '蟠龙路', 
                    '天宫山路', '栖贤路', '樟海路', '南五街'
                ]
            },
            {
                id: 'chengqu',
                name: '老城区',
                color: '#e74c3c',
                center: [104.615, 28.768],
                bounds: [
                    [104.590, 28.750],
                    [104.640, 28.785]
                ],
                streets: [
                    '东街', '中山街', '栈房街', '抗建路', '滨江路西段', '北正街', '长春街', '刘臣街', 
                    '东楼街', '上走马街', '集义街', '女学街', '清华街', '水井街', '忠孝街', '北较场街', 
                    '小碑巷', '大碑巷', '小北街', '中心路', '青年街', '文重街', '大南街', '洞天街', 
                    '西街', '仁和街', '慈善街', '光复街', '专署街', '仁爱街', '建设路', '文星街', 
                    '人民路', '人民广场东路', '前进路', '金沙江北路东段', '新中路', '苗圃路', '较场路', 
                    '书苑路', '青皮树街', '东浩街', '都长街', '咸熙街', '拱星街', '匡时街', '衣服街', 
                    '复兴街', '交通街', '县府路', '正气巷'
                ]
            },
            {
                id: 'shangjiangbei',
                name: '上江北',
                color: '#3498db',
                center: [104.635, 28.795],
                bounds: [
                    [104.610, 28.770],
                    [104.660, 28.820]
                ],
                streets: [
                    '岷江北滨路', '锁江路', '岷江东路', '岷江西路', '纸业路', '月耳池街', '五粮液路', 
                    '曲水路', '新街', '水帘路', '江楼路', '公园一路', '规划三路', '公园二路', '古塔路', 
                    '金鹰街', '旧州路', '农机厂街', '民乐街', '敬业路', '文化街', '红丰东路', '广厦东路', 
                    '广发巷', '广厦西路', '安康街', '创新路', '红丰西路', '外环路', '碾子山路', '红霞路', 
                    '青云路', '铁肩街', '致富路', '新建东路', '学院路', '支九路', '振兴路', '高发路', 
                    '丹山路', '顺达街', '致远路', '红坝路', '锦绣路', '兴盛路', '龙泉街', '翠微路', 
                    '恒通街', '菱角街', '盛达街', '汇远街', '纵四路', '金盾街', '金台街', '东山路', 
                    '弘博路', '弘博街', '金穗街', '瑞祥街', '广坪路', '花园北路', '花园南路', '花园东路', 
                    '梁雁街', '友善街', '河湾路', '岷江北路'
                ]
            },
            {
                id: 'xiajiangbei',
                name: '下江北',
                color: '#f39c12',
                center: [104.682, 28.775],
                bounds: [
                    [104.650, 28.750],
                    [104.710, 28.800]
                ],
                streets: [
                    '志诚路', '兴港大道', '港城大道', '港城路', '僰侯庙路', '环长江景观大道', '红星路', 
                    '黄角坪路', '中元路', '天元路', '马鞍路', '经十八路', '经十七路', '白沙路', '学堂路', 
                    '池口街', '池塘街', '学社路', '农盛路', '白塔路', '光明路', '希望路', '洗马池路', 
                    '化工路', '古井路', '长江路西段', '长江路北段', '经十九路', '环六路', '大学路', 
                    '飞云路', '核桃树路', '构庄路', '李湾路', '新楼路', '国兴大道', '长翠路', '石岗路', 
                    '赵坝路', '峥嵘路', '文博路', '护国路', '龙头山路', '沙坪路', '塘湾路', '泰兴街', 
                    '水井湾路', '长江北路', '梨湾路', '龙兴路', '盛港路', '恒源路', '牌坊路', '新田湾路', 
                    '嘉信路', '磅礴路', '广进路'
                ]
            }
        ];

        // 计算总数
        let totalStreets = 0;
        regionData.forEach(region => {
            totalStreets += region.streets.length;
        });

        // 更新统计显示
        document.getElementById('total-count').textContent = totalStreets;

        // 生成区域统计HTML
        const statsHtml = regionData.map(region => `
            <div class="legend-item" onclick="zoomToRegion([${region.center[0]}, ${region.center[1]}])">
                <div class="color-box" style="background: ${region.color}"></div>
                <div class="region-info">
                    <div class="region-name">
                        ${region.name}
                        <span style="color: ${region.color}">${region.streets.length}</span>
                    </div>
                    <div class="street-count">${region.streets.length}条街道</div>
                </div>
            </div>
        `).join('');
        
        document.getElementById('region-stats').innerHTML = statsHtml;

        // ==================== 初始化地图 ====================
        let map = null;
        let markers = [];

        window.onload = function() {
            // 初始化高德地图
            map = new AMap.Map('map', {
                center: [104.641, 28.768],
                zoom: 13,
                viewMode: '2D',
                resizeEnable: true
            });

            // 添加控件
            map.addControl(new AMap.Scale({ position: 'LB' }));
            map.addControl(new AMap.ToolBar({ position: 'RT' }));

            // 添加区域边界和街道标记
            addRegionBoundaries();
            generateStreetMarkers();
            
            console.log('地图初始化成功，共添加 ' + markers.length + ' 个街道标记');
        };

        // ==================== 生成街道标记 ====================
        function generateStreetMarkers() {
            regionData.forEach(region => {
                const bounds = region.bounds;
                
                region.streets.forEach(streetName => {
                    // 在区域内生成随机位置
                    const lng = bounds[0][0] + Math.random() * (bounds[1][0] - bounds[0][0]);
                    const lat = bounds[0][1] + Math.random() * (bounds[1][1] - bounds[0][1]);
                    
                    // 创建自定义标记
                    const markerContent = document.createElement('div');
                    markerContent.style.width = '12px';
                    markerContent.style.height = '12px';
                    markerContent.style.backgroundColor = region.color;
                    markerContent.style.borderRadius = '50%';
                    markerContent.style.border = '2px solid white';
                    markerContent.style.boxShadow = '0 2px 8px rgba(0,0,0,0.3)';
                    markerContent.style.cursor = 'pointer';
                    markerContent.style.transition = 'all 0.2s';
                    
                    const marker = new AMap.Marker({
                        position: [lng, lat],
                        content: markerContent,
                        map: map,
                        title: streetName
                    });
                    
                    // 信息窗口
                    const infoWindow = new AMap.InfoWindow({
                        content: `
                            <div class="custom-info-window">
                                <h3 style="color: ${region.color}">🛣️ ${streetName}</h3>
                                <p>
                                    <span class="region-badge" style="background: ${region.color}">
                                        ${region.name}
                                    </span>
                                </p>
                                <p style="color: #666; font-size: 12px; margin-top: 8px;">
                                    点击地图任意位置关闭
                                </p>
                            </div>
                        `,
                        offset: new AMap.Pixel(0, -25)
                    });
                    
                    marker.on('click', function() {
                        infoWindow.open(map, marker.getPosition());
                    });
                    
                    markers.push(marker);
                });
            });
        }

        // ==================== 添加区域轮廓 ====================
        function addRegionBoundaries() {
            regionData.forEach(region => {
                // 绘制矩形边界
                const rectangle = new AMap.Rectangle({
                    map: map,
                    bounds: new AMap.Bounds(
                        new AMap.LngLat(region.bounds[0][0], region.bounds[0][1]),
                        new AMap.LngLat(region.bounds[1][0], region.bounds[1][1])
                    ),
                    strokeColor: region.color,
                    strokeWeight: 3,
                    strokeOpacity: 0.8,
                    strokeStyle: 'dashed',
                    fillColor: region.color,
                    fillOpacity: 0.08
                });
                
                // 添加区域名称
                const text = new AMap.Text({
                    text: region.name,
                    position: region.center,
                    map: map,
                    style: {
                        'background-color': region.color,
                        'color': 'white',
                        'font-weight': 'bold',
                        'font-size': '14px',
                        'padding': '4px 12px',
                        'border-radius': '20px',
                        'border': '2px solid white',
                        'box-shadow': '0 2px 8px rgba(0,0,0,0.2)',
                        'white-space': 'nowrap'
                    }
                });
            });
            
            // 添加长江示意线
            const riverPath = [
                [104.610, 28.768],
                [104.640, 28.775],
                [104.670, 28.770]
            ];
            
            new AMap.Polyline({
                path: riverPath,
                strokeColor: '#3498db',
                strokeWeight: 4,
                strokeOpacity: 0.4,
                map: map
            });
            
            // 长江文字
            new AMap.Text({
                text: '🌊 长江',
                position: [104.630, 28.777],
                map: map,
                style: {
                    'background-color': 'transparent',
                    'color': '#3498db',
                    'font-weight': 'bold',
                    'font-size': '14px',
                    'text-shadow': '0 0 5px white'
                }
            });
        }

        // ==================== 工具函数 ====================
        window.zoomToRegion = function(center) {
            if (map) {
                map.setZoomAndCenter(14, center);
            }
        };

        window.resetMapView = function() {
            if (map) {
                map.setZoomAndCenter(13, [104.641, 28.768]);
            }
        };
    </script>
</body>
</html>
