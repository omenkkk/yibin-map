<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>宜宾地图</title>
    <style>
        #map { width: 100%; height: 100vh; }
    </style>
    <!-- 👇 重点：把这里换成你的密钥 -->
    <script src="https://webapi.amap.com/maps?v=2.0&key=042f5d18d3c7e4b2a7d6f8c9e0a1b2c3"></script>
</head>
<body>
    <div id="map"></div>
    <script>
        // 初始化宜宾地图
        var map = new AMap.Map('map', {
            center: [104.641, 28.768],  // 宜宾市中心坐标
            zoom: 13,                     // 缩放级别
            viewMode: '2D'                 // 2D模式
        });
        
        // 添加标记
        var marker = new AMap.Marker({
            position: [104.641, 28.768],
            map: map
        });
    </script>
</body>
</html>
